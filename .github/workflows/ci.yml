name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Qt needs a few system libs to load even the offscreen platform on Linux.
      - name: Install Qt runtime libs (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libxkbcommon0 libdbus-1-3

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,gui]"

      - name: Lint
        run: python -m ruff check .

      - name: Test (non-hardware)
        env:
          QT_QPA_PLATFORM: offscreen
        run: python -m pytest -q

  # Coupling guard: fail loudly if a newer libagent/trezorlib drops a symbol
  # treza.agent depends on. Runs unpinned to catch upstream drift early.
  upstream-drift:
    name: upstream drift check
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: |
          python -m pip install --upgrade pip
          pip install libagent trezor trezor_agent platformdirs pytest
      - run: python -m pytest tests/test_coupling.py -q
