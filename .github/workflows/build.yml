name: Build

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    name: build (${{ matrix.osname }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            osname: linux
          - os: windows-latest
            osname: windows
          - os: macos-latest
            osname: macos
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      # Derive both the tag label (e.g. v0.0.2, used in file names) and the
      # numeric version (0.0.2, used for the installer's display version).
      - name: Resolve version
        id: ver
        shell: bash
        run: |
          ref="${{ github.ref_name }}"
          if [[ "$ref" =~ ^v(.+)$ ]]; then
            tag="$ref"; version="${BASH_REMATCH[1]}"
          else
            tag="dev"; version="0.0.0-dev"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Building $tag (version $version)"

      - name: Install Qt runtime libs (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libxkbcommon0 libdbus-1-3

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[gui]" pyinstaller

      - name: Build (onedir)
        run: pyinstaller packaging/treza.spec --noconfirm

      - name: Build Windows installer
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress
          $version = "${{ steps.ver.outputs.version }}"
          $tag = "${{ steps.ver.outputs.tag }}"
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "/DMyAppVersion=$version" "/Ftreza-setup-$tag" packaging\windows\treza.iss

      - name: Upload Windows installer
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v7
        with:
          name: treza-${{ steps.ver.outputs.tag }}-windows-installer
          path: installer/treza-setup-${{ steps.ver.outputs.tag }}.exe
          if-no-files-found: error

      # --- Signing (requires secrets; left as documented placeholders) ---
      # Windows Authenticode:
      #   signtool sign /fd SHA256 /tr <timestamp-url> /td SHA256 \
      #     /f cert.pfx /p ${{ secrets.WIN_CERT_PASSWORD }} dist/treza/treza.exe
      # macOS Developer ID + notarization:
      #   codesign --deep --force --options runtime --sign "Developer ID Application: ..." dist/treza
      #   ditto -c -k --keepParent dist/treza treza-macos.zip
      #   xcrun notarytool submit treza-macos.zip --keychain-profile treza --wait
      #   xcrun stapler staple dist/treza/treza.app

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: treza-${{ steps.ver.outputs.tag }}-${{ matrix.osname }}
          path: dist/treza
          if-no-files-found: error
