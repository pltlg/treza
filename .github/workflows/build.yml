name: Build

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    name: build (${{ matrix.osname }})
    runs-on: ${{ matrix.os }}
    # Mapped from secrets so step `if:` can test for their presence. When a
    # secret is unset these are empty strings and the signing steps are skipped,
    # so public/forked builds still produce (unsigned) artifacts.
    env:
      WIN_CERT_BASE64: ${{ secrets.WIN_CERT_BASE64 }}
      WIN_CERT_PASSWORD: ${{ secrets.WIN_CERT_PASSWORD }}
      APPLE_CERT_BASE64: ${{ secrets.APPLE_CERT_BASE64 }}
      APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
      APPLE_SIGN_IDENTITY: ${{ secrets.APPLE_SIGN_IDENTITY }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            osname: linux
          - os: windows-latest
            osname: windows
          - os: macos-latest
            osname: macos
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          ref="${{ github.ref_name }}"
          if [[ "$ref" =~ ^v(.+)$ ]]; then
            tag="$ref"; version="${BASH_REMATCH[1]}"
          else
            tag="dev"; version="0.0.0-dev"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Building $tag (version $version)"

      - name: Install Qt runtime libs (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libxkbcommon0 libdbus-1-3

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[gui]" pyinstaller

      - name: Build (onedir)
        env:
          TREZA_VERSION: ${{ steps.ver.outputs.version }}
        run: pyinstaller packaging/treza.spec --noconfirm

      # --- Windows code signing (Authenticode) ---
      - name: Sign Windows binary
        if: runner.os == 'Windows' && env.WIN_CERT_BASE64 != ''
        shell: pwsh
        run: |
          $pfx = Join-Path $env:RUNNER_TEMP "cert.pfx"
          [IO.File]::WriteAllBytes($pfx, [Convert]::FromBase64String($env:WIN_CERT_BASE64))
          $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\signtool.exe" |
            Sort-Object FullName -Descending | Select-Object -First 1
          if (-not $signtool) { throw "signtool.exe not found" }
          & $signtool.FullName sign /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 `
            /f $pfx /p $env:WIN_CERT_PASSWORD "dist\treza\treza.exe"
          Remove-Item $pfx

      - name: Build Windows installer
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress
          $version = "${{ steps.ver.outputs.version }}"
          $tag = "${{ steps.ver.outputs.tag }}"
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "/DMyAppVersion=$version" "/Ftreza-setup-$tag" packaging\windows\treza.iss

      - name: Sign Windows installer
        if: runner.os == 'Windows' && env.WIN_CERT_BASE64 != ''
        shell: pwsh
        run: |
          $pfx = Join-Path $env:RUNNER_TEMP "cert.pfx"
          [IO.File]::WriteAllBytes($pfx, [Convert]::FromBase64String($env:WIN_CERT_BASE64))
          $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\signtool.exe" |
            Sort-Object FullName -Descending | Select-Object -First 1
          & $signtool.FullName sign /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 `
            /f $pfx /p $env:WIN_CERT_PASSWORD "installer\treza-setup-$("${{ steps.ver.outputs.tag }}").exe"
          Remove-Item $pfx

      # --- macOS code signing + notarization ---
      - name: Sign and notarize macOS app
        if: runner.os == 'macOS' && env.APPLE_CERT_BASE64 != ''
        run: |
          set -euo pipefail
          KEYCHAIN="$RUNNER_TEMP/build.keychain"
          P12="$RUNNER_TEMP/cert.p12"
          echo "$APPLE_CERT_BASE64" | base64 --decode > "$P12"
          security create-keychain -p actions "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p actions "$KEYCHAIN"
          security import "$P12" -k "$KEYCHAIN" -P "$APPLE_CERT_PASSWORD" -T /usr/bin/codesign
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')
          security set-key-partition-list -S apple-tool:,apple: -s -k actions "$KEYCHAIN"
          codesign --deep --force --options runtime --timestamp \
            --sign "$APPLE_SIGN_IDENTITY" dist/treza.app
          ditto -c -k --keepParent dist/treza.app "$RUNNER_TEMP/treza.zip"
          xcrun notarytool submit "$RUNNER_TEMP/treza.zip" \
            --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD" --wait
          xcrun stapler staple dist/treza.app

      # --- Package one archive per OS (preserving the top-level folder) ---
      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path dist\treza -DestinationPath "treza-${{ steps.ver.outputs.tag }}-windows.zip" -Force

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: (cd dist && zip -qr "../treza-${{ steps.ver.outputs.tag }}-linux.zip" treza)

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: ditto -c -k --keepParent dist/treza.app "treza-${{ steps.ver.outputs.tag }}-macos.zip"

      - name: Upload bundle
        uses: actions/upload-artifact@v7
        with:
          name: treza-${{ steps.ver.outputs.tag }}-${{ matrix.osname }}
          path: treza-${{ steps.ver.outputs.tag }}-${{ matrix.osname }}.zip
          if-no-files-found: error

      - name: Upload Windows installer
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v7
        with:
          name: treza-${{ steps.ver.outputs.tag }}-windows-installer
          path: installer/treza-setup-${{ steps.ver.outputs.tag }}.exe
          if-no-files-found: error

  # Publish a GitHub Release with all built assets attached. Tag pushes only.
  release:
    name: release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist-artifacts

      - name: Collect assets
        run: |
          set -euo pipefail
          mkdir -p release
          find dist-artifacts -type f \( -name '*.zip' -o -name '*.exe' \) -exec cp {} release/ \;
          ls -la release

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" release/* \
            --repo "${{ github.repository }}" \
            --title "Treza ${{ github.ref_name }}" \
            --generate-notes \
            --prerelease
