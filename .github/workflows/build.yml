name: Build

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    name: build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Qt runtime libs (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libxkbcommon0 libdbus-1-3

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[gui]" pyinstaller

      - name: Build (onedir)
        run: pyinstaller packaging/treza.spec --noconfirm

      - name: Build Windows installer
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress
          $ref = "${{ github.ref_name }}"
          if ($ref -match '^v(.+)$') { $version = $Matches[1] } else { $version = '0.0.0-dev' }
          Write-Host "Building installer version $version"
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "/DMyAppVersion=$version" packaging\windows\treza.iss

      - name: Upload Windows installer
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: treza-windows-installer
          path: installer/treza-setup.exe
          if-no-files-found: error

      # --- Signing (requires secrets; left as documented placeholders) ---
      # Windows Authenticode:
      #   signtool sign /fd SHA256 /tr <timestamp-url> /td SHA256 \
      #     /f cert.pfx /p ${{ secrets.WIN_CERT_PASSWORD }} dist/treza/treza.exe
      # macOS Developer ID + notarization:
      #   codesign --deep --force --options runtime --sign "Developer ID Application: ..." dist/treza
      #   ditto -c -k --keepParent dist/treza treza-macos.zip
      #   xcrun notarytool submit treza-macos.zip --keychain-profile treza --wait
      #   xcrun stapler staple dist/treza/treza.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: treza-${{ matrix.os }}
          path: dist/treza
          if-no-files-found: error
